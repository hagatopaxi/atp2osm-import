<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atp2osm{% if is_dev %} - DEV{% endif %} — {% block page_title %}Enrichir OpenStreetMap avec AllThePlaces{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}atp2osm — Importez les points d'intérêt AllThePlaces dans OpenStreetMap. Outil de contribution collaboratif pour les cartographes OSM français.{% endblock %}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{ request.base_url }}" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="atp2osm" />
    <meta property="og:url" content="{{ request.base_url }}" />
    <meta property="og:title" content="{% block og_title %}atp2osm — Enrichir OpenStreetMap avec AllThePlaces{% endblock %}" />
    <meta property="og:description" content="{% block og_description %}Importez les points d'intérêt AllThePlaces dans OpenStreetMap. Outil de contribution collaboratif pour les cartographes OSM français.{% endblock %}" />
    <meta property="og:image" content="{{ url_for('static', filename='img/og-card.png', _external=True) }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="atp2osm — Enrichir OpenStreetMap avec AllThePlaces" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ self.og_title() }}" />
    <meta name="twitter:description" content="{{ self.og_description() }}" />
    <meta name="twitter:image" content="{{ url_for('static', filename='img/og-card.png', _external=True) }}" />

    {% block structured_data %}{% endblock %}

    <link href="/static/lib/daisyui-5.css?v={{ app_version }}" rel="stylesheet" type="text/css" />
    <script src="/static/lib/tailwind-4.js?v={{ app_version }}"></script>
    <link rel="stylesheet" href="/static/lib/iconoir.css?v={{ app_version }}" type="text/css" />
    <link rel="stylesheet" href="/static/css/app.css?v={{ app_version }}" type="text/css" />
    <link rel="stylesheet" href="/static/css/icown.css?v={{ app_version }}" type="text/css" />
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg" />

    {% block custom_css %}
    {% endblock %}

    <script src="/static/js/auth.js?v={{ app_version }}"></script>
    {% block custom_js %}
    {% endblock %}
</head>

<body class="flex h-screen w-screen bg-base-300 gap-2 p-2">
    <input type="checkbox" id="sidebar-toggle" class="hidden" checked />
    {% include '_aside.html' %}

    <main class="flex flex-col bg-base-200 rounded-md flex-grow p-3 overflow-x-auto gap-2">
        <div class="mb-4">
            <h1 class="text-xl font-bold mb-4 font-mono flex items-center"><i class="iconoir-nav-arrow-right"></i>{%
                block title %}{% endblock %}</h1>
            <p class="text-sm text-gray-500 w-2/3">{% block subtitle %}{% endblock %}</p>
        </div>

        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/sidebar.js?v={{ app_version }}"></script>
</body>

</html>
